function hzToggle(){
var svg = document.querySelector('svg');
var btn = document.getElementById('hzBtn');

try{ svg.pauseAnimations(); }catch(e){}
svg.__hzPaused = true;
btn.innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play';
} else {
try{ svg.unpauseAnimations(); }catch(e){}
svg.__hzPaused = false;
btn.innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> Pause';
}
}
</script>
